services:
  - type: web
    name: esrs-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run db:setup && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: esrs-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_UPLOAD_MB
        value: 10
      - key: PSGC_BASE_URL
        value: https://psgc.cloud/api

databases:
  - name: esrs-db
    databaseName: esrs
    user: esrs
    plan: free
