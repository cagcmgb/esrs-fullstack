services:
  db:
    image: postgres:16
    container_name: esrs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: esrs
    ports:
      - "5432:5432"
    volumes:
      - esrs_db_data:/var/lib/postgresql/data

volumes:
  esrs_db_data:
